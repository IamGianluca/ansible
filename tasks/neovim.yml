- name: Add neovim unstable repository from PPA and install its signing key 
  become: true
  ansible.builtin.apt_repository:
    repo: ppa:neovim-ppa/unstable

- name: Install Neovim
  become: true
  ansible.builtin.apt:
    name: ['neovim', 'python3-neovim', 'python3-venv']
    update_cache: yes

- name: Install extra Dependencies for Telescope
  become: true
  ansible.builtin.apt:
    name: ['ripgrep', 'fd-find']

- name: Install tree-sitter-cli for nvim-treesitter (requires Cargo)
  community.general.cargo:
    name: tree-sitter-cli
    locked: true
