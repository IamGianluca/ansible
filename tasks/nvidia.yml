- name: Download CUDA keyring
  become: true
  ansible.builtin.get_url:
    url: https://developer.download.nvidia.com/compute/cuda/repos/ubuntu2404/x86_64/cuda-keyring_1.1-1_all.deb
    dest: /tmp/cuda-keyring_1.1-1_all.deb
    mode: '0644'

- name: Install CUDA keyring
  become: true
  ansible.builtin.apt:
    deb: /tmp/cuda-keyring_1.1-1_all.deb
    state: present

- name: Update apt cache
  become: true
  ansible.builtin.apt:
    update_cache: true

- name: Install CUDA toolkit and drivers
  become: true
  ansible.builtin.apt:
    name:
      - cuda-toolkit-13-2
      - cuda-drivers
    state: present
