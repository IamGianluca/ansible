- name: Install Neovim
  shell: brew install neovim

- name: Install extra Dependencies for Telescope
  community.general.homebrew:
    name: ripgrep,fd
    state: present
    
- name: Install tree-sitter-cli for nvim-treesitter (requires Cargo)
  community.general.cargo:
    name: tree-sitter-cli
    locked: true
    executable: "{{ ansible_env.HOME }}/.cargo/bin/cargo"
