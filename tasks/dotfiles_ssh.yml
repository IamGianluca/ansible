- name: Clone .dotfiles
  ansible.builtin.git:
    repo: 'git@github.com:IamGianluca/dotfiles.git'
    dest: "{{ lookup('env', 'HOME') }}/.dotfiles"
    recursive: yes
    # Do not update the dotfiles project if already installed locally, to avoid 
    # losing local changes. This will also prevent conflicts caused by jj 
    # (jujutsu-svc). jj maintains a working copy commit, that always appear as 
    # local modifications. 
    update: no
    accept_hostkey: yes
    version: main
    key_file: "{{ lookup('env', 'HOME') }}/.ssh/id_rsa"  # Specify your SSH key

- name: Install dotfiles
  ansible.builtin.shell: cd $HOME/.dotfiles && ./install
  register: dotfiles_result
  changed_when: "'All commands have been executed' in dotfiles_result.stdout"
  # We need to ignore errors because the script returns exit code 1
  # even when it completes most tasks successfully with only some links missing
  failed_when: false
  
- name: Display dotfiles installation results
  ansible.builtin.debug:
    msg: "{{ dotfiles_result.stdout_lines }}"
  when: dotfiles_result.stdout is defined
